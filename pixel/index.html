<!-- index.html for BlackBeltah Pairing UI --><!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLACKBELTAH - MD BOT</title>
  <link rel="icon" href="https://raw.githubusercontent.com/Toxicant1/black-super-bot/main/blackmachant.jpg" type="image/png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }
    body {
      background: #000;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    .banner {
      background: url('https://raw.githubusercontent.com/Toxicant1/black-super-bot/main/blackmachant.jpg') no-repeat center center;
      background-size: cover;
      height: 300px;
      border: 5px double #ff00bd;
      margin-bottom: 30px;
    }
    .title {
      font-size: 2.5rem;
      font-weight: bold;
      margin: 20px 0;
      color: #ff26d0;
    }
    .description {
      font-size: 1.1rem;
      color: #ccc;
      margin-bottom: 20px;
    }
    .pair-btn {
      background: #1BAFBA;
      padding: 15px 30px;
      color: #fff;
      font-size: 1.2rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .pair-btn:hover {
      background: #138a91;
    }
    .footer {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #999;
    }
    audio {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="banner"></div>
  <div class="title">💥 𝐁𝐋𝐀𝐂𝐊𝐁𝐄𝐋𝐓𝐀𝐇 - 𝐌𝐃 𝐁𝐎𝐓 💥</div>
  <div class="description">
    Welcome to the official pairing portal of <strong>BeltahBot</strong>.<br>
    Click the button below to generate your unique <strong>pairing code</strong> for WhatsApp Multi-Device.
  </div><button class="pair-btn" onclick="window.location.href='/generate-session'">🎯 Generate Pairing Code</button>

  <audio controls autoplay loop>
    <source src="https://raw.githubusercontent.com/Toxicant1/black-super-bot/main/ponk.mp3" type="audio/mp3">
    Your browser does not support the audio element.
  </audio>  <div class="footer">
    Made with 💖 by Ishaq Ibrahim | Powered by Beltah × ChatGPT
  </div>
</body>
</html>
