<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BeltahBot • Live on WhatsApp</title>
  <style>
    body {
      background-image: url('https://i.imgur.com/XR1Neb9.jpeg');
      background-size: cover;
      background-position: center;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 60px auto;
      padding: 30px;
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    h1 {
      color: #007f5f;
      font-size: 36px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #fff;
    }

    p {
      color: #222;
      font-size: 18px;
      line-height: 1.6;
    }

    .highlight {
      font-weight: bold;
      color: #33cc33;
      text-shadow: 0 0 10px #fff;
    }

    .social-icons {
      margin-top: 20px;
    }

    .social-icons a {
      margin: 0 10px;
      display: inline-block;
    }

    .social-icons img {
      width: 32px;
      height: 32px;
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #333;
    }

    .footer-note {
      color: #007f5f;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to BeltahBot</h1>
    <p>
      Holla 👋🏾, you’ve <span class="highlight">successfully</span> launched <span class="highlight">BeltahBot</span>.<br/>

        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v7/icons/github.svg" alt="GitHub">
      </a>
      <a href="https://wa.me/254741819582" target="_blank">
        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v7/icons/whatsapp.svg" alt="WhatsApp">
      </a>
    </div>

    <footer>
      <p>&copy; 2025 <span class="footer-note">Beltah MD</span><br/>
      Made in 🇰🇪 by <strong>Ishaq Ibrahim</strong></p>
    </footer>
  </div>
</body>
</html>
