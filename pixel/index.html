<!-- 🔥 BELTAH-MD PAIRING UI WITH MUSIC & INPUT --><!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>𝐁𝐋𝐀𝐂𝐊𝐁𝐄𝐋𝐓𝐀𝐇 - Pair Bot</title>
  <link rel="icon" href="https://raw.githubusercontent.com/Toxicant1/black-super-bot/main/blackmachant.jpg" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #000000, #222222);
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 450px;
      margin: 50px auto;
      background: #111;
      border: 4px double #ff00bd;
      border-radius: 20px;
      padding: 25px;
    }
    h1 {
      font-size: 30px;
      color: #ff26d0;
      margin-bottom: 10px;
    }
    .btn {
      display: block;
      width: 100%;
      margin: 10px auto;
      padding: 10px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ff26d0;
      color: white;
    }
    input {
      width: 80%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ff26d0;
      background: #222;
      color: white;
      margin-bottom: 10px;
    }
    .output {
      background: #222;
      padding: 10px;
      border-radius: 10px;
      border: 1px dashed #ff26d0;
      margin: 15px 0;
    }
    audio {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💥 𝐁𝐋𝐀𝐂𝐊𝐁𝐄𝐋𝐓𝐀𝐇 - 𝗠𝗗 𝗣𝗔𝗜𝗥𝗜𝗡𝗚 💥</h1><button class="btn" onclick="location.href='https://github.com/Toxicant1/blackbeltah-md'">🔗 Fork Bot Repo</button>
<button class="btn" onclick="document.getElementById('pairArea').style.display='block'">🔑 Generate Pair Code</button>

<div id="pairArea" style="display:none;">
  <input id="phoneInput" placeholder="Enter your WhatsApp number" />
  <button class="btn" onclick="generateCode()">🔐 ENTER</button>
  <div class="output" id="output">Your pairing code will appear here...</div>

  <audio id="bgMusic" controls loop style="display:block;">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  <button class="btn" onclick="toggleMusic()">🎵 Play / Pause Song</button>
</div>

  </div>  <script>
    function generateCode() {
      const phone = document.getElementById('phoneInput').value;
      if (!phone || phone.length < 10) {
        document.getElementById('output').innerText = '⚠️ Enter a valid number starting with country code.';
        return;
      }
      const code = `PAIR-${Math.floor(100000 + Math.random() * 900000)}`;
      document.getElementById('output').innerText = `✅ Your Pair Code: ${code}`;
    }

    function toggleMusic() {
      const audio = document.getElementById('bgMusic');
      if (audio.paused) audio.play();
      else audio.pause();
    }
  </script></body>
</html>
