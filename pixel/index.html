<!DOCTYPE html>
<html>
<head>
  <title>BLACK BELTAH</title>
  <style>
    body {
      background-image: url('https://i.imgur.com/XR1Neb9.jpeg');
      background-size: cover;
      background-position: center;
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    .container {
      background-color: rgba(0, 0, 0, 0.7);
      padding: 40px;
      border-radius: 12px;
      margin: 50px auto;
      width: 90%;
      max-width: 700px;
    }
    h1 {
      font-size: 38px;
      color: #00ffcc;
    }
    p, label {
      font-size: 18px;
      margin: 12px 0;
    }
    input {
      padding: 10px;
      width: 80%;
      margin-bottom: 20px;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px 20px;
      border: none;
      background-color: #00ffcc;
      color: #000;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }
    audio {
      margin-top: 20px;
      width: 100%;
    }
    iframe {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>BLACK BELTAH BOT 🔥</h1>
    <p>You have <strong>successfully connected</strong> to the bot. Status: <span style="color: lime;">ACTIVE ✅</span></p>

    <label>Enter WhatsApp Number:</label><br>
    <input type="text" id="waNumber" placeholder="e.g. 254115172722"><br>

    <div id="qr-section">
      <p>Use the generated QR to pair with WhatsApp:</p>
      <img id="qrCode" src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=Linking" alt="QR Code"><br>
      <button onclick="refreshQR()">🔁 Refresh</button>
      <button onclick="copyQR()">📋 Copy</button>
    </div>

    <audio controls autoplay loop>
      <source src="/Media/black.mp3" type="audio/mp3">
      Your browser does not support the audio element.
    </audio>

    <p><a href="https://github.com/Toxicant1/black-super-bot" target="_blank">📁 View Bot Repository</a></p>
    <p>&copy; 2025 BLACK BELTAH</p>
  </div>

  <script>
    function refreshQR() {
      const qrImg = document.getElementById("qrCode");
      const rand = Math.floor(Math.random() * 99999);
      qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=WhatsAppBlackBeltahBot${rand}`;
    }

    function copyQR() {
      const qrSrc = document.getElementById("qrCode").src;
      navigator.clipboard.writeText(qrSrc).then(() => {
        alert("QR Code URL copied!");
      });
    }
  </script>
</body>
</html>
