<!-- 📲 BLACKBELTAH - MD BOT INTERFACE --><!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLACKBELTAH-MD</title>
  <link rel="icon" href="https://raw.githubusercontent.com/Toxicant1/black-super-bot/main/blackmachant.jpg">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(#0f0f0f, #1c1c1c);
      color: #fff;
      text-align: center;
    }
    .glow {
      height: 40px;
      width: 100%;
    }
    h1 {
      font-family: 'Black Ops One', sans-serif;
      color: #FF26D0;
      font-size: 3rem;
    }
    .section {
      display: none;
      padding: 2rem;
    }
    .active {
      display: block;
    }
    .button {
      background: #FF26D0;
      border: none;
      padding: 15px 30px;
      color: white;
      font-size: 1.1rem;
      margin: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    .button:hover {
      background: #d41eaa;
    }
    .banner {
      width: 300px;
      height: 300px;
      border-radius: 10px;
      border: 4px double #FF26D0;
    }
    .input-container {
      margin-top: 20px;
    }
    input[type="text"] {
      padding: 10px;
      width: 250px;
      font-size: 1rem;
      border-radius: 6px;
      border: 2px solid #ff69b4;
    }
    #code-box {
      margin-top: 20px;
      font-size: 1.4rem;
      color: #0f0;
    }
    audio {
      margin-top: 30px;
    }
    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>
  <img class="glow" src="https://i.imgur.com/dBaSKWF.gif" />
  <h1>💥 BLACKBELTAH - MD BOT 💥</h1>
  <img class="banner" src="https://raw.githubusercontent.com/Toxicant1/black-super-bot/main/blackmachant.jpg" alt="Bot Banner" />  <div id="home" class="section active">
    <h2>Welcome to BlackBeltah!</h2>
    <button class="button" onclick="switchPage('pair')">🔐 Pair Code</button>
    <a href="https://github.com/Toxicant1/blackbeltah-md"><button class="button">📦 Bot Repo</button></a>
  </div>  <div id="pair" class="section">
    <h2>🔑 Generate Your Pair Code</h2>
    <div class="input-container">
      <input type="text" id="phoneInput" placeholder="Enter your WhatsApp number" />
      <button class="button" onclick="generateCode()">Enter</button>
    </div>
    <div id="code-box">🔲 Your 8-digit code will appear here</div>
    <button class="button" onclick="toggleAudio()">🎵 Play/Pause Background Music</button>
    <audio id="bgAudio">
      <source src="https://filesamples.com/samples/audio/mp3/sample3.mp3" type="audio/mp3">
    </audio>
  </div>  <img class="glow" src="https://i.imgur.com/dBaSKWF.gif" />
  <div class="footer">
    &copy; 2025 BLACKBELTAH-MD • Built by Ishaq Ibrahim • Instagram: @toxic._.a.n.t
  </div>  <script>
    function switchPage(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function generateCode() {
      const phone = document.getElementById('phoneInput').value;
      if (!phone || phone.length < 8) {
        alert('Please enter a valid WhatsApp number.');
        return;
      }
      const code = Math.floor(10000000 + Math.random() * 90000000);
      document.getElementById('code-box').innerText = `🔑 Pair Code: ${code}`;
    }

    function toggleAudio() {
      const audio = document.getElementById("bgAudio");
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    }
  </script></body>
</html>
