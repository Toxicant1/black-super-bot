<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BeltahBot • Pairing Code</title>
  <style>
    body {
      background-image: url('https://i.imgur.com/XR1Neb9.jpeg');
      background-size: cover;
      background-position: center;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 60px auto;
      padding: 30px;
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    h1 {
      color: #007f5f;
      font-size: 36px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #fff;
    }

    .code-box {
      font-size: 32px;
      font-weight: bold;
      color: #222;
      margin: 20px 0;
      background: #e0ffe0;
      padding: 20px;
      border-radius: 12px;
      border: 2px dashed #007f5f;
      text-shadow: 0 0 4px #fff;
    }

    .status {
      color: #333;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .error {
      color: red;
      font-weight: bold;
      margin-top: 10px;
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #333;
    }

    .footer-note {
      color: #007f5f;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>BeltahBot Pairing Code</h1>
    <p class="status">⏳ Please wait while we fetch your WhatsApp code...</p>
    <div id="pair-code" class="code-box">Generating...</div>
    <p id="error-msg" class="error"></p>

    <footer>
      <p>&copy; 2025 <span class="footer-note">Beltah MD</span><br/>
      Made in 🇰🇪 by <strong>Ishaq Ibrahim</strong></p>
    </footer>
  </div>

  <script>
    async function getPairingCode() {
      try {
        const res = await fetch('/generate');
        if (!res.ok) throw new Error('Server error while fetching code');

        const data = await res.json();
        if (data && data.code) {
          document.getElementById('pair-code').innerText = 'CODE: ' + data.code;
          document.querySelector('.status').innerText = '🔗 Use this code to link your WhatsApp.';
        } else {
          throw new Error('Code not found in response');
        }
      } catch (err) {
        document.getElementById('pair-code').innerText = '—';
        document.getElementById('error-msg').innerText = '❌ Failed to fetch code: ' + err.message;
      }
    }

    window.onload = getPairingCode;
  </script>
</body>
</html>
