<!DOCTYPE html>
<html>
<head>
  <title>BELTAH TECH - Pairing Console</title>
  <style>
    body {
      background-image: url('https://i.imgur.com/XR1Neb9.jpeg');
      background-size: cover;
      background-position: center;
      font-family: Arial, sans-serif;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background-color: #ffffffdd;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
    h1 {
      color: #00698f;
      text-align: center;
    }
    .beautified-text {
      text-align: center;
      font-size: 20px;
      color: #00698f;
      margin-bottom: 30px;
    }
    .input-box {
      text-align: center;
      margin-bottom: 20px;
    }
    .input-box input {
      padding: 10px;
      width: 80%;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
    .section {
      margin-top: 20px;
    }
    .section p {
      font-weight: bold;
      font-size: 18px;
    }
    .pair-code, .session-id {
      background-color: #f1f1f1;
      padding: 10px;
      margin-top: 10px;
      border-left: 5px solid #33cc33;
      font-family: monospace;
      font-size: 18px;
    }
    .audio-player {
      margin-top: 30px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WELCOME TO BELTAH TECH</h1>
    <p class="beautified-text">
      Holla, you have <span>successfully</span> connected to 
      <span>BELTAH-BOT</span>. The bot is currently running and <span>ACTIVE</span>.
    </p>

    <div class="section">
      <h2>🔑 PAIR YOUR DEVICE</h2>
      <p>Enter your WhatsApp number:</p>
      <div class="input-box">
        <input type="text" id="numberInput" placeholder="e.g. 254741819582" />
      </div>
      <div class="pair-code" id="pairCode">Awaiting phone number input...</div>
      <div class="session-id" id="sessionId">Session ID will appear here</div>
    </div>

    <div class="audio-player">
      <h3>🎶 Background Music</h3>
      <audio controls autoplay loop>
        <source src="media/black.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

    <p style="text-align:center;">&copy; 2025 <strong style="color: green;">BELTAH MD</strong></p>
  </div>

  <script>
    function generatePairCode(length = 8) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let result = "";
      for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    function generateSessionID() {
      const code = generatePairCode(6);
      return `BELTAH-SESSION-${code}`;
    }

    document.getElementById("numberInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        const phone = this.value.trim();
        if (!phone) {
          alert("Please enter your WhatsApp number.");
          return;
        }

        const pairCode = generatePairCode();
        const sessionId = generateSessionID();

        document.getElementById("pairCode").textContent = `Pair Code for ${phone}: ${pairCode}`;
        document.getElementById("sessionId").textContent = `Session ID: ${sessionId}`;
      }
    });
  </script>
</body>
</html>
