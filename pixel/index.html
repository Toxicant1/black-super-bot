<!-- Beltah Pair Code Generator UI (Fixed for 8-digit codes) --><!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>𝐁𝐋𝐀𝐂𝐊𝐁𝐄𝐋𝐓𝐀𝐇 - Pair Code Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom right, #0f0f0f, #1a1a1a);
      color: #fff;
      text-align: center;
    }
    h1 {
      font-family: 'Black Ops One', cursive;
      font-size: 2.6em;
      color: #FF26D0;
      margin-top: 30px;
    }
    .box {
      background: #222;
      border: 2px double #FF26D0;
      padding: 25px;
      margin: 30px auto;
      width: 90%;
      max-width: 500px;
      border-radius: 12px;
    }
    .button {
      padding: 12px 24px;
      margin-top: 10px;
      background: #FF26D0;
      color: white;
      border: none;
      font-weight: bold;
      font-size: 1.1em;
      border-radius: 8px;
      cursor: pointer;
    }
    input {
      padding: 10px;
      width: 80%;
      border-radius: 6px;
      border: none;
      font-size: 1em;
      margin-bottom: 10px;
    }
    #codeOutput {
      font-family: monospace;
      background: #111;
      padding: 12px;
      margin-top: 12px;
      font-size: 1.3em;
      border: 1px dashed #FF26D0;
      border-radius: 6px;
      display: inline-block;
      word-spacing: 3px;
    }
    .link-btn {
      display: inline-block;
      margin: 15px;
      text-decoration: none;
      background: #1b1b1b;
      padding: 10px 18px;
      border-radius: 6px;
      border: 1px solid #888;
      color: #FF26D0;
      font-weight: bold;
    }
    audio {
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <h1>💥 𝐁𝐋𝐀𝐂𝐊𝐁𝐄𝐋𝐓𝐀𝐇 - 𝗠𝗗 𝗣𝗔𝗜𝗥𝗜𝗡𝗚 💥</h1>  <div class="box">
    <h3>🔗 Enter your WhatsApp Number</h3>
    <input type="text" id="userNumber" placeholder="e.g. 2547XXXXXXXX">
    <br>
    <button class="button" onclick="generateCode()">Generate Pair Code</button><div id="codeOutput" style="display:none;"></div>

<br><br>
<a href="https://github.com/Toxicant1/blackbeltah-md" target="_blank" class="link-btn">🌐 Bot GitHub Repo</a>

  </div>  <div class="box">
    <h3>🎵 Theme Song: Ponk</h3>
    <audio id="bgmusic" controls>
      <source src="https://raw.githubusercontent.com/Toxicant1/black-super-bot/main/Media/ponk.mp3" type="audio/mp3">
      Your browser does not support the audio element.
    </audio>
  </div>  <script>
    function generateCode() {
      const number = document.getElementById("userNumber").value.trim();
      if (!number || !/^[0-9]{10,15}$/.test(number)) {
        alert("Please enter a valid phone number (e.g. 2547XXXXXXXX)");
        return;
      }
      const code = `PAIR-${randBlock()}-${randBlock()}`;
      const output = document.getElementById("codeOutput");
      output.innerText = `✅ Pair Code for ${number}\n${code}`;
      output.style.display = "inline-block";
    }

    function randBlock() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let result = '';
      for (let i = 0; i < 4; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }
  </script></body>
</html>
