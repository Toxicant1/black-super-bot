<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BeltahBot • WhatsApp Pairing</title>
  <style>
    /* Your existing CSS */
    body {
      background-image: url('https://i.imgur.com/XR1Neb9.jpeg');
      background-size: cover;
      background-position: center;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      display: flex; /* Added for centering */
      justify-content: center; /* Added for centering */
      align-items: center; /* Added for centering */
      min-height: 100vh; /* Added for centering */
    }

    .container {
      max-width: 800px;
      margin: 60px auto; /* Margin might need adjustment with flex centering */
      padding: 30px;
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      text-align: center;
      width: 90%; /* Responsive width */
    }

    h1 {
      color: #007f5f;
      font-size: 36px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #fff;
    }

    .input-group {
      margin-bottom: 20px;
    }

    input[type="tel"] {
      width: calc(100% - 24px); /* Adjusted for padding */
      padding: 12px 10px;
      margin-bottom: 15px; /* Spacing below input */
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box; /* Include padding in width */
    }

    button {
      background-color: #007f5f; /* Green */
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      width: 100%;
    }

    button:hover {
      background-color: #006b50; /* Darker green on hover */
    }

    .code-box {
      font-size: 32px;
      font-weight: bold;
      color: #222;
      margin: 20px 0;
      background: #e0ffe0;
      padding: 20px;
      border-radius: 12px;
      border: 2px dashed #007f5f;
      text-shadow: 0 0 4px #fff;
      word-break: break-all; /* Ensure long codes wrap */
      display: none; /* Initially hidden */
    }

    .status {
      color: #333;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .error {
      color: red;
      font-weight: bold;
      margin-top: 10px;
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #333;
    }

    .footer-note {
      color: #007f5f;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>BeltahBot WhatsApp Pairing</h1>
    <p class="status" id="status-message">Enter your WhatsApp number (with country code) below.</p>

    <div class="input-group">
        <input type="tel" id="phoneNumber" placeholder="+254712345678" required>
        <button id="getPairingCodeBtn">Get Pairing Code</button>
    </div>

    <div id="pair-code-container" class="code-box">
        <p>Your Pairing Code:</p>
        <div id="pair-code"></div>
        <p class="status-message">Enter this code in your WhatsApp app when prompted. Also check WhatsApp for a pairing request message.</p>
    </div>
    
    <p id="error-msg" class="error"></p>

    <footer>
      <p>&copy; 2025 <span class="footer-note">Beltah MD</span><br/>
      Made in 🇰🇪 by <strong>Ishaq Ibrahim</strong></p>
    </footer>
  </div>

  <script>
    const phoneNumberInput = document.getElementById('phoneNumber');
    const getPairingCodeBtn = document.getElementById('getPairingCodeBtn');
    const pairCodeContainer = document.getElementById('pair-code-container');
    const pairCodeDisplay = document.getElementById('pair-code');
    const statusMessageElement = document.getElementById('status-message');
    const errorMessageElement = document.getElementById('error-msg');

    getPairingCodeBtn.addEventListener('click', async () => {
      const phoneNumber = phoneNumberInput.value.trim();

      // Basic frontend validation
      if (!phoneNumber) {
        errorMessageElement.innerText = 'Please enter your WhatsApp number.';
        pairCodeContainer.style.display = 'none';
        return;
      }
      if (!phoneNumber.startsWith('+') || phoneNumber.length < 10) {
        errorMessageElement.innerText = 'Please enter a valid number including country code (e.g., +2547XXXXXXXX).';
        pairCodeContainer.style.display = 'none';
        return;
      }

      // Reset display
      errorMessageElement.innerText = '';
      pairCodeContainer.style.display = 'none';
      statusMessageElement.innerText = '⏳ Requesting pairing code...';
      getPairingCodeBtn.textContent = 'Generating...';
      getPairingCodeBtn.disabled = true;

      try {
        const response = await fetch('/generate', {
          method: 'POST', // Send as POST
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ number: phoneNumber }) // Send number in JSON body
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.message || `Server error: ${response.status}`);
        }

        const data = await response.json();
        
        if (data && data.code) {
          pairCodeDisplay.innerText = data.code;
          pairCodeContainer.style.display = 'block';
          statusMessageElement.innerText = '🔗 Use this code to link your WhatsApp.';
        } else {
          throw new Error('No pairing code received from the server.');
        }

      } catch (err) {
        console.error("Frontend fetch error:", err);
        pairCodeDisplay.innerText = '—';
        pairCodeContainer.style.display = 'none'; // Hide code box on error
        statusMessageElement.innerText = '⚠️ Failed to get code.'; // Generic user message
        errorMessageElement.innerText = '❌ Error: ' + err.message; // Detailed error for user
      } finally {
        getPairingCodeBtn.textContent = 'Get Pairing Code';
        getPairingCodeBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
