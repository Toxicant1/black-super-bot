<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>𝐁𝐋𝐀𝐂𝐊𝐁𝐄𝐋𝐓𝐀𝐇‑MD Pair Code Generator</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(to bottom right, #050505, #10101a);
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .header-glow {
      background: url("https://i.imgur.com/dBaSKWF.gif") center/cover;
      height: 40px;
    }

    h1 {
      font-family: "Black Ops One", cursive;
      font-size: 44px;
      color: #ff26d0;
      text-shadow: 0 0 8px #ff26d0;
    }

    .card {
      background: #111;
      border: 2px double #ff26d0;
      padding: 20px;
      border-radius: 20px;
      max-width: 500px;
      margin: 20px auto;
    }

    input {
      padding: 12px;
      font-size: 18px;
      width: 80%;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      padding: 14px 22px;
      font-size: 18px;
      margin: 5px;
      background: #ff26d0;
      color: #fff;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
    }

    .result {
      background: #000;
      color: #0f0;
      font-family: monospace;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .footer-img {
      margin-top: 30px;
      width: 300px;
      height: auto;
      border-radius: 20px;
      border: 4px double #ff26d0;
    }
  </style>
</head>
<body>

  <div class="header-glow"></div>
  <h1>💥 𝐁𝐋𝐀𝐂𝐊𝐁𝐄𝐋𝐓𝐀𝐇‑MD BOT 💥</h1>
  <div class="header-glow"></div>

  <!-- Pair Code Section -->
  <div class="card">
    <h2>🔑 Generate Pair Code</h2>
    <input id="phone" placeholder="Enter phone number (e.g. 2547XXXXXXXX)"/>
    <br/>
    <button onclick="generateCode()">ENTER</button>
    <div id="output" class="result"></div>
  </div>

  <!-- GitHub Repo -->
  <div class="card">
    <h2>📁 GitHub Repo</h2>
    <a href="https://github.com/Toxicant1/blackbeltah-md" target="_blank">
      <button>🔗 Fork BeltahBot Repo</button>
    </a>
  </div>

  <!-- Music Section -->
  <div class="card">
    <h2>🎵 Now Playing: ponk.mp3</h2>
    <audio id="beltahAudio" loop>
      <source src="https://dl.sndup.net/6kzq/ponk.mp3" type="audio/mpeg" />
    </audio>
    <button onclick="toggleMusic()">▶️ Play / ⏸ Pause</button>
  </div>

  <img class="footer-img" src="https://raw.githubusercontent.com/Toxicant1/black-super-bot/main/blackmachant.jpg" />
  <div class="header-glow"></div>

  <!-- Scripts -->
  <script>
    async function generateCode() {
      let num = document.getElementById("phone").value.trim();
      let out = document.getElementById("output");
      if (!num) return out.innerText = "⚠️ Enter a valid phone number";
      out.innerText = "⏳ Generating code...";
      try {
        let res = await fetch(`/pair?number=${num}`);
        let text = await res.text();
        out.innerText = "✅ Pair Code:\n" + text;
      } catch {
        out.innerText = "❌ Error generating code";
      }
    }

    function toggleMusic() {
      const audio = document.getElementById("beltahAudio");
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    }
  </script>

</body>
</html>
