<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BELTAH BOT | Pair Code</title>
  <style>
    body {
      background-image: url('https://i.imgur.com/XR1Neb9.jpeg');
      background-size: cover;
      font-family: Arial, sans-serif;
      color: #00698f;
      text-align: center;
      padding: 40px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      padding: 30px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .beautified-text {
      color: #33cc33;
      font-weight: bold;
      font-size: 20px;
      margin-bottom: 20px;
    }

    .code-box {
      background: #f4f4f4;
      border: 2px dashed #00698f;
      font-size: 24px;
      font-weight: bold;
      padding: 15px;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      background: #00698f;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #004f6e;
    }

    .icons {
      margin-top: 30px;
    }

    .icons a {
      margin: 0 10px;
    }

    .icons img {
      width: 24px;
      height: 24px;
    }

    audio {
      margin-top: 20px;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WELCOME TO BELTAH TECH</h1>
    <p class="beautified-text">You've successfully connected to <span>BELTAH-BOT</span> 🔗</p>

    <div id="pairStatus">⏳ Waiting for Pair Code...</div>
    <div class="code-box" id="pairCode">Loading...</div>

    <button onclick="copyCode()">📋 Copy Code</button>
    <button onclick="refreshCode()">🔄 Refresh</button>
    <button onclick="checkStatus()">🔍 Check Status</button>

    <audio controls autoplay loop>
      <source src="/Media/black.mp3" type="audio/mpeg">
      Your browser does not support the audio tag.
    </audio>

    <div class="icons">
      <a href="https://github.com/toxicant1/black-super-bot"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v7/icons/github.svg" alt="GitHub"></a>
      <a href="https://wa.me/254115172722"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v7/icons/whatsapp.svg" alt="WhatsApp"></a>
    </div>

    <p style="margin-top: 20px;">&copy; 2025 BELTAH MD</p>
  </div>

  <script>
    let currentCode = "";

    async function fetchPairCode() {
      try {
        const res = await fetch('/getPairCode');
        const data = await res.json();
        currentCode = data.code || "Unavailable";
        document.getElementById("pairCode").textContent = currentCode;
        document.getElementById("pairStatus").textContent = "🔐 Enter this code in WhatsApp → Linked Devices";
      } catch (e) {
        document.getElementById("pairCode").textContent = "⚠️ Failed to load code";
        document.getElementById("pairStatus").textContent = "❌ Connection Error";
      }
    }

    async function checkStatus() {
      const res = await fetch('/status');
      const data = await res.json();
      document.getElementById("pairStatus").textContent = data.connected 
        ? "✅ Bot is now Linked & Active!" 
        : "🕐 Still waiting for pairing...";
    }

    function copyCode() {
      navigator.clipboard.writeText(currentCode);
      alert("✅ Pair code copied!");
    }

    function refreshCode() {
      fetchPairCode();
    }

    fetchPairCode();
  </script>
</body>
</html>
